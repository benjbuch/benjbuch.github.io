- id: "SOP0007"
  filename: "sop_0007-v1-sds_page"
  changes:
    - time: "2022-09-20"
      text: "Adaptation as SOP; added SDS/Laemmli and LDS sample buffer recipes. Tris-glycine / Mini-PROTEAN workflow informed by Bio-Rad Mini-PROTEAN and Criterion cell manuals (Bulletin 1658100, Bulletin 6040); Bis-Tris / MES / MOPS pathway drawn from the Tom Muir lab \"Pouring and running SDS-PAGE gels\" protocol."
