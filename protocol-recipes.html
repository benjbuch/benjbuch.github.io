---
layout: default
title: Recipe reference
permalink: /recipes/
---

<div class="recipes-page">
  <h1 class="section-header">Recipe reference</h1>

  <!-- Status line -->
  <p id="recipe-status" class="muted"></p>

  <!-- Main content area -->
  <div id="recipe-content" class="recipe-layout">

    <!-- Left panel: search + list -->
    <div class="recipe-list-panel">
      <form id="recipe-form" class="recipe-form" onsubmit="return false">
        <div class="row">
          <input id="recipe-search" type="search" autocomplete="off" placeholder="e.g. EDTA, R0017, Tris" />
        </div>
      </form>
      <div id="recipe-list" class="recipe-list"></div>
    </div>

    <!-- Right panel: recipe detail -->
    <div id="recipe-detail" class="recipe-detail"></div>

  </div>

  <!-- Footer -->
  <p class="recipe-footer muted">Amounts scale proportionally with total solvent volume.</p>
</div>

<style>

  .recipes-page {
    display: flex;
    flex-direction: column;
    height: calc(100vh - var(--footer-height) - var(--header-height) - 2 * var(--pad-l));
    margin: var(--pad-l) auto;
    max-width: 90ch;
  }

  /* ---- Form ---- */

  .recipe-form .row {
    display: flex;
    flex-wrap: wrap;
    gap: var(--pad-m);
    margin-bottom: var(--pad-l);
  }

  .recipe-form input[type="search"] {
    flex: 1;
    min-width: 20ch;
  }

  /* ---- Two-column layout ---- */

  .recipe-layout {
    display: flex;
    flex: 1 1 auto;
    gap: var(--pad-l);
    padding: var(--pad-s);
    align-items: stretch;
    height: 100vh;
    overflow: hidden;
  }
  
  .recipe-list-panel {
    flex: 0 0 20ch;
    display: flex;
    height: 100%;
    flex-direction: column;
  }

  .recipe-list {
    flex: 1 1 auto;
    min-width: 20ch;
    overflow-y: auto;
    border: 1px solid var(--border-subtle);
    padding: 4px;
    border-radius: 0.25rem;
    overflow-y: scroll;
    align-self: flex-start;
    scrollbar-gutter: stable;
  }
  

  .recipe-list.full-width {
    flex: 1 1 100%;
  }

  .recipe-detail {
    flex: 1 1 60ch;
    min-width: 0;
    min-height: 0;
    padding-right: var(--pad-s);
    overflow-y: auto;
    scrollbar-gutter: stable;
  }

  .recipe-detail:empty ~ .recipe-list,
  .recipe-detail:empty + .recipe-list {
    flex: 1 1 100%;
  }

  /* ---- List items ---- */

  .recipe-item {
    background: none;
    border: 1px solid transparent;
    color: inherit;
    cursor: pointer;
    display: flex;
    font-family: inherit;
    font-size: 0.8rem;
    justify-content: space-between;
    align-items: center;
    text-align: left;
    width: 100%;
    box-sizing: border-box;
    outline: none;
  }
  
  .recipe-item:focus {
    outline: none;
  }
  
  .recipe-item:focus-visible {
    outline: 2px solid var(--focus-ring);
    outline-offset: 2px;
    border-radius: 4px;
  }

  .recipe-item:hover {
    background: var(--surface-raised);
  }

  .recipe-item.selected {
    background: var(--surface-accent);
  }

  .recipe-item-name {
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .recipe-item-id {
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-left: var(--pad-s);
  }
  
  .recipe-item.disabled {
    opacity: 0.5;
    cursor: pointer;
    font-style: italic;
    justify-content: center;
    pointer-events: auto;
  }

  /* ---- Recipe card ---- */

  .recipe-card {
    background: var(--surface-raised);
    border: 1px solid var(--border-strong);
    border-radius: 0.5rem;
    overflow: hidden;
  }

  /* Header */

  .rc-header {
    border-bottom: 2px solid var(--border-strong);
    padding: var(--pad-m) var(--pad-l) var(--pad-m);
  }

  .rc-header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .rc-header-actions {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: var(--pad-l);
  }

  .rc-header h2 {
    font-style: italic;
    margin-top: var(--pad-m);
  }

  .rc-header h2 .rc-abbr {
    font-style: normal;
    font-weight: normal;
  }

  .rc-header h2 .rc-stock {
    font-style: normal;
    font-weight: normal;
    white-space: nowrap;
  }

  .rc-header .rc-props {
    color: var(--text-secondary);
    margin-top: var(--pad-s);
  }

  .rc-header .rc-id {
    color: var(--text-secondary);
    font-family: var(--font-mono);
  }

  .rc-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    cursor: pointer;
    padding: 0;
    outline: none;
    font-size: 1.2rem;
  }

  /* Ingredients table */

  .rc-table {
    border-collapse: collapse;
    font-size: 0.8rem;
    width: 100%;
  }

  .rc-table thead tr {
    border-bottom: 2px solid var(--border-strong);
    text-align: left;
  }

  .rc-table th {
    padding: var(--pad-s) var(--pad-m);
  }

  .rc-table th.col-unit {
    width: 3ch;
  }

  .rc-table td {
    padding: var(--pad-s) var(--pad-m);
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: baseline;
  }

  .rc-table .col-amount {
    font-variant-numeric: tabular-nums;
    text-align: right;
    white-space: nowrap;
  }

  .rc-table .col-unit {
    white-space: nowrap;
  }

  .rc-table .col-stock,
  .rc-table .col-final {
    text-align: right;
    white-space: nowrap;
  }

  .rc-table .solvent-row td {
    border-top: 2px solid var(--border-strong);
    border-bottom: none;
    padding-bottom: var(--pad-m);
  }

  .rc-ing-optional {
    color: var(--text-secondary);
    font-style: italic;
  }

  .rc-ref-link {
    background: none;
    border: none;
    color: var(--link);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0;
    margin-left: 0.3rem;
  }
  
  .rc-ref-link:hover {
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .rc-cas {
    color: var(--text-secondary);
    font-size: 0.7rem;
    margin-left: var(--pad-m);
  }

  /* Scale controls */

  .rc-scale {
    align-items: center;
    background: var(--surface-inset);
/*    border-top: 1px solid var(--border-subtle);*/
    border: none;
    display: flex;
    flex-wrap: wrap;
    gap: var(--pad-m);
    padding: var(--pad-l);
  }

  .rc-scale-label {
    color: var(--text-secondary);
    font-size: 0.8rem;
  }

  .rc-scale-input {
    border: none;
    border-bottom: 2px solid var(--border-subtle);
    border-radius: 0;
    background: transparent;
    color: var(--text-primary);
    font-size: 0.8rem;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    text-align: right;
    padding: 0;
    margin: 0;
    margin-left: var(--pad-m);
    width: 5ch;
    outline: none;
  }

  .rc-scale-unit {
    color: var(--text-secondary);
    font-size: 0.8rem;
  }

  .rc-scale-presets {
    display: flex;
    gap: var(--pad-m);
  }

  .rc-scale-btn {
    background: transparent;
    border: 1px solid var(--border-subtle);
    border-radius: 0.25rem;
    color: var(--text-tertiary);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.05rem 0.4rem;
  }

  .rc-scale-btn.active {
    background: var(--hover-raised);
    border-color: var(--border-strong);
    color: var(--text-primary);
  }

  /* Body: workup, storage, notes, safety */

  .rc-body {
/*    border-top: 1px solid var(--border-strong);*/
    font-size: 0.85rem;
    line-height: 1.55;
    padding: var(--pad-m) var(--pad-l) var(--pad-l);
  }

  .rc-workup {
    margin-bottom: var(--pad-s);
  }

  .rc-storage {
    color: var(--fg-muted);
    font-size: 0.82rem;
    margin-bottom: var(--pad-s);
  }

  .rc-note {
    font-size: 0.82rem;
    margin-bottom: 0.2rem;
  }

  .rc-note-typed {
    border-left: 3px solid var(--border-strong);
    padding-left: var(--pad-s);
  }

  .rc-note-critical {
    background: color-mix(in srgb, var(--accent-red, #dc2626) 8%, transparent);
    border-left: 3px solid var(--accent-red, #dc2626);
    border-radius: 0.2rem;
    color: var(--accent-red, #991b1b);
    font-weight: 500;
    padding: 0.2rem var(--pad-s);
  }

  /* Safety block */

  .rc-safety {
    border-radius: 0.25rem;
    font-size: 0.82rem;
    line-height: 1.5;
    margin-top: var(--pad-m);
    padding: var(--pad-s) var(--pad-m);
  }

  .rc-safety-danger {
    background: color-mix(in srgb, var(--accent-red, #dc2626) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent-red, #dc2626) 30%, transparent);
    color: var(--accent-red, #991b1b);
  }

  .rc-safety-warning {
    background: color-mix(in srgb, var(--accent-gold, #d97706) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent-gold, #d97706) 30%, transparent);
    color: var(--accent-gold, #92400e);
  }

  .rc-safety-none {
    background: color-mix(in srgb, var(--accent-green, #16a34a) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent-green, #16a34a) 30%, transparent);
    color: var(--accent-green, #166534);
  }

  .rc-signal {
    border-radius: 0.2rem;
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 0.2rem;
    padding: 0.05rem 0.45rem;
    text-transform: uppercase;
  }

  .rc-signal-danger {
    background: var(--accent-red, #dc2626);
    color: #fff;
  }

  .rc-signal-warning {
    background: var(--accent-gold, #d97706);
    color: #fff;
  }

  .rc-safety-precaution {
    font-style: italic;
  }

  /* Source */

  .rc-sources {
    color: var(--fg-muted);
    font-size: 0.72rem;
    margin-top: var(--pad-m);
  }

  /* Footer */

  .recipe-footer {
    border-top: 1px solid var(--border-strong);
    font-size: 0.72rem;
    margin-top: 2rem;
    padding-top: var(--pad-m);
  }

  /* ---- Responsive ---- */

  @media (max-width: 640px) {
    .recipe-layout {
      flex-direction: column;
    }
    .recipe-list-panel {
      flex: 1 1 100%;
      max-height: none;
      border-right: none;
    }
    .recipe-detail {
      flex: 1 1 100%;
    }
  }

</style>

<script>
document.addEventListener("DOMContentLoaded", function () {

  /* ==== Unit conversion ==== */

  var UNIT_MAP = {
    gram: "g", kilogram: "kg", milligram: "mg", microgram: "\u00B5g", nanogram: "ng",
    liter: "L", milliliter: "mL", microliter: "\u00B5L",
    meter: "m", millimeter: "mm", micrometer: "\u00B5m", nanometer: "nm", centimeter: "cm",
    second: "s", minute: "min", hour: "h",
    celsius: "\u00B0C", fahrenheit: "\u00B0F", kelvin: "K",
    molar: "M", millimolar: "mM", micromolar: "\u00B5M", nanomolar: "nM",
    percent: "%",
    "gram per mol": "g/mol", "gram per liter": "g/L", "gram per milliliter": "g/mL",
    "milligram per liter": "mg/L", "milligram per milliliter": "mg/mL",
    "microgram per milliliter": "\u00B5g/mL", "microgram per liter": "\u00B5g/L",
    "milliliter per liter": "mL/L", "square centimeter": "cm\u00B2",
    bar: "bar", millibar: "mbar", psi: "psi",
    basepair: "bp", colonyformingunit: "cfu", enzymeunit: "U",
    "enzymeunit per microliter": "U/\u00B5L", "enzymeunit per liter": "U/L",
    fold: "\u00D7", gauge: "G", gforce: "\u00D7\u2009g", kb: "kb", nucleotides: "nt",
    rpm: "rpm", ppm: "ppm", ppt: "ppt", torr: "Torr",
    unitless: "", vol: "vol", pound: "lb", inch: "in"
  };

  var PREFIXES = [["milli","m"],["micro","\u00B5"],["nano","n"],["kilo","k"]];

  function convertUnit(raw) {
    if (!raw) return "";
    if (UNIT_MAP[raw] !== undefined) return UNIT_MAP[raw];
    for (var i = 0; i < PREFIXES.length; i++) {
      var pre = PREFIXES[i][0], sym = PREFIXES[i][1];
      if (raw.indexOf(pre) === 0) {
        var base = raw.slice(pre.length);
        if (UNIT_MAP[base] !== undefined) return sym + UNIT_MAP[base];
      }
    }
    var m = raw.match(/^(.+?)\s+per\s+(.+)$/);
    if (m) {
      var n = convertUnit(m[1]), d = convertUnit(m[2]);
      if (n && d) return n + "/" + d;
    }
    return raw;
  }

  function parseUnitStr(raw) {
    if (!raw) return "";
    var rm = raw.match(/^([\d,._]+)\s+to\s+([\d,._]+)\s+(.+)$/);
    if (rm) return rm[1].replace(/_/g,"") + "\u2013" + rm[2].replace(/_/g,"") + " " + convertUnit(rm[3]);
    var sm = raw.match(/^([\d,._]+)\s+(.+)$/);
    if (sm) return (sm[1].replace(/_/g,"") + " " + convertUnit(sm[2])).trim();
    return raw;
  }

  /* ==== XML helpers ==== */

  function directChildren(el, tag) {
    var out = [];
    for (var i = 0; i < el.childNodes.length; i++) {
      var c = el.childNodes[i];
      if (c.nodeType === 1 && c.tagName === tag) out.push(c);
    }
    return out;
  }

  function firstChild(el, tag) {
    for (var i = 0; i < el.childNodes.length; i++) {
      var c = el.childNodes[i];
      if (c.nodeType === 1 && c.tagName === tag) return c;
    }
    return null;
  }

  function textOf(el) {
    if (!el) return "";
    var t = "";
    for (var i = 0; i < el.childNodes.length; i++) {
      var n = el.childNodes[i];
      if (n.nodeType === 3) t += n.textContent;
      else if (n.nodeType === 1) {
        if (n.tagName === "unit") t += parseUnitStr((n.textContent||"").trim());
        else if (n.tagName === "pH") t += "pH " + n.textContent;
        else t += textOf(n);
      }
    }
    return t.trim();
  }

  function htmlOf(el) {
    if (!el) return "";
    var h = "";
    for (var i = 0; i < el.childNodes.length; i++) {
      var n = el.childNodes[i];
      if (n.nodeType === 3) { h += n.textContent; continue; }
      if (n.nodeType !== 1) continue;
      var tag = n.tagName;
      if (tag === "chemical") {
        var raw = n.textContent || "";
        raw = raw.replace(/_(\d+)/g, "<sub>$1</sub>");
        raw = raw.replace(/_\{([^}]+)\}/g, "<sub>$1</sub>");
        raw = raw.replace(/\^(\d+)/g, "<sup>$1</sup>");
        raw = raw.replace(/\^\{([^}]+)\}/g, "<sup>$1</sup>");
        h += raw;
      } else if (tag === "pH") h += "pH&nbsp;" + n.textContent;
      else if (tag === "sc") h += '<span style="font-variant:small-caps">' + n.textContent + "</span>";
      else if (tag === "unit") h += parseUnitStr((n.textContent||"").trim());
      else if (tag === "high") h += "<sup>" + n.textContent + "</sup>";
      else if (tag === "it") h += "<em>" + n.textContent + "</em>";
      else h += htmlOf(n);
    }
    return h;
  }

  function parseAmt(str) {
    if (!str) return { value: null, unit: "" };
    var m = str.match(/^([\d.]+)\s+(.+)$/);
    if (m) return { value: parseFloat(m[1]), unit: convertUnit(m[2]) };
    return { value: null, unit: str };
  }

  /* ==== Parse recipe element ==== */

  function parseRecipe(el) {
    var nameEl = firstChild(el, "name");
    var abbrEl = firstChild(el, "abbreviation");
    var stockEl = firstChild(el, "stock");
    var solventEl = firstChild(el, "solvent");
    var storageEl = firstChild(el, "storage");
    var shelflifeEl = firstChild(el, "shelflife");
    var safetyEl = firstChild(el, "safety");

    var solvent = null;
    if (solventEl) {
      var sn = firstChild(solventEl, "name");
      var sa = firstChild(solventEl, "amount");
      var sp = firstChild(solventEl, "property");
      solvent = {
        nameHtml: sn ? htmlOf(sn) : "",
        property: sp ? textOf(sp) : "",
        amount: sa ? parseAmt(textOf(sa)) : null
      };
    }

    var ingredients = directChildren(el, "ingredient").map(function (ing) {
      var iName = firstChild(ing, "name");
      var iAbbr = firstChild(ing, "abbreviation");
      var iStock = firstChild(ing, "stock");
      var iAmt = firstChild(ing, "amount");
      var iFinal = firstChild(ing, "final");
      var iProps = directChildren(ing, "property").map(function (p) { return htmlOf(p); });
      return {
        refId: ing.getAttribute("id") || "",
        cas: ing.getAttribute("CAS") || "",
        type: ing.getAttribute("type") || "",
        nameHtml: iName ? htmlOf(iName) : "",
        abbrHtml: iAbbr ? htmlOf(iAbbr) : "",
        props: iProps,
        stock: iStock ? parseUnitStr(textOf(iStock)) : "",
        amount: iAmt ? parseAmt(textOf(iAmt)) : null,
        final: iFinal ? parseUnitStr(textOf(iFinal)) : ""
      };
    });

    var workups = directChildren(el, "workup").map(function (w) { return htmlOf(w); });
    var notes = directChildren(el, "note").map(function (n) {
      return { type: n.getAttribute("type") || "", html: htmlOf(n) };
    });

    var safety = null;
    if (safetyEl) {
      safety = {
        signal: safetyEl.getAttribute("signal") || "",
        hazards: directChildren(safetyEl, "hazard").map(function (h) {
          return { hide: h.getAttribute("hide") === "yes", text: textOf(h) };
        }),
        precautions: directChildren(safetyEl, "precaution").map(function (p) { return textOf(p); }),
        disposals: directChildren(safetyEl, "disposal").map(function (d) { return htmlOf(d); })
      };
    }

    var storage = storageEl ? { html: htmlOf(storageEl) } : null;
    var sources = directChildren(el, "source").map(function (s) {
      return {
        type: s.getAttribute("type") || "",
        id: s.getAttribute("id") || "",
        version: s.getAttribute("version") || "",
        primary: s.getAttribute("primary") === "yes",
        filename: textOf(s)
      };
    });

    return {
      id: el.getAttribute("id") || "",
      name: nameEl ? textOf(nameEl) : "",
      nameHtml: nameEl ? htmlOf(nameEl) : "",
      abbreviation: abbrEl ? textOf(abbrEl) : "",
      abbrHtml: abbrEl ? htmlOf(abbrEl) : "",
      stock: stockEl ? parseUnitStr(textOf(stockEl)) : "",
      properties: directChildren(el, "property").map(function (p) { return htmlOf(p); }),
      solvent: solvent,
      ingredients: ingredients,
      workups: workups,
      storage: storage,
      shelflife: shelflifeEl ? htmlOf(shelflifeEl) : "",
      notes: notes,
      safety: safety,
      categories: directChildren(el, "category").map(function (c) { return textOf(c); }),
      sources: sources
    };
  }

  /* ==== Formatting ==== */

  function fmt(val) {
    if (val === null) return "";
    if (Math.abs(val) >= 100) return val.toFixed(0);
    if (Math.abs(val) >= 10) return val.toFixed(1);
    if (Math.abs(val) >= 1) return val.toFixed(2);
    return val.toFixed(3);
  }

  /* ==== Rendering ==== */

  function renderIngRow(ing, scale) {
    var baseVal = ing.amount && ing.amount.value !== null
      ? ing.amount.value
      : null;

    var propsHtml = ing.props.map(function (p) {
      return ', <span class="rc-ing-props">' + p + "</span>";
    }).join("");

    var typeHtml = "";
    if (ing.type === "optional")
      typeHtml = ' <span class="rc-ing-optional">(optional)</span>';
    else if (ing.type === "fresh")
      typeHtml = ' <span class="rc-ing-optional">(add fresh)</span>';

    var refHtml = ing.refId
      ? ' <button class="rc-ref-link" data-ref="' + ing.refId + '">[' + ing.refId + "]</button>"
      : "";

    var casHtml = ing.cas
      ? ' <span class="rc-cas">[' + ing.cas + "]</span>"
      : "";

    var abbrHtml = ing.abbrHtml
      ? ' <span class="rc-ing-props">(' + ing.abbrHtml + ")</span>"
      : "";

    return "<tr>" +
      '<td class="col-amount">' +
        (baseVal !== null
          ? '<span class="rc-amt" data-base="' + baseVal + '">' + fmt(baseVal) + "</span>"
          : "") +
      "</td>" +
      '<td class="col-unit">' + (ing.amount ? ing.amount.unit : "") + "</td>" +
      "<td>" + ing.nameHtml + abbrHtml + propsHtml + typeHtml + refHtml + casHtml + "</td>" +
      '<td class="col-stock">' + ing.stock + "</td>" +
      '<td class="col-final">' + ing.final + "</td>" +
      "</tr>";
  }

  function renderCard(recipe, scale) {
    var h = "";
    // Header
    h += '<div class="rc-header"><div class="rc-header-top"><div>';
    h += "<h2>";
    h += '<span class="rc-name">' + recipe.nameHtml + "</span>";
    if (recipe.abbrHtml) h += ' <span class="rc-abbr">(' + recipe.abbrHtml + ")</span>";
    if (recipe.stock) h += ', <span class="rc-stock">' + recipe.stock + "</span>";
    h += "</h2>";

    if (recipe.properties.length) {
      h += '<div class="rc-props">';
      h += recipe.properties.join(", ");
      h += "</div>";
    }

    h += "</div>"; // close left block

    // Right side (stacked)
    h += '<div class="rc-header-actions">';
    h += '<button class="rc-close" id="rc-close">\u00D7</button>';
    h += '<span class="rc-id">' + recipe.id + "</span>";
    h += "</div>";

    h += "</div></div>";
    
    // --- Base volume ---
    var baseVol = recipe.solvent && recipe.solvent.amount
      ? recipe.solvent.amount.value
      : null;
  
    var baseUnit = recipe.solvent && recipe.solvent.amount
      ? recipe.solvent.amount.unit
      : "";
      
    var scale = currentScale;
  
    // ------------------
    // TABLE
    // ------------------
  
    h += '<table class="rc-table"><thead><tr>';
    h += '<th class="col-amount">Amount</th><th class="col-unit"></th>';
    h += "<th>Ingredient</th>";
    h += '<th class="col-stock">Stock</th><th class="col-final">Final</th>';
    h += "</tr></thead><tbody>";
  
    // Regular ingredient rows
    for (var i = 0; i < recipe.ingredients.length; i++) {
      h += renderIngRow(recipe.ingredients[i], scale);
      var ing = recipe.ingredients[i];
      var amt = ing.amount && ing.amount.value !== null
        ? fmt(ing.amount.value * scale)
        : "";
    }
  
    // ------------------
    // SOLVENT ROW (authoritative volume)
    // ------------------
  
    if (recipe.solvent) {
      var baseVol = recipe.solvent.amount && recipe.solvent.amount.value !== null
        ? recipe.solvent.amount.value
        : null;

      var scaledVol = baseVol && currentScale
        ? baseVol * currentScale
        : null;

      h += '<tr class="solvent-row">';

      h += '<td class="col-amount">';
      if (scaledVol !== null) {
        h += 'To <input class="rc-scale-input" id="rc-vol-input" type="text" value="' + fmt(scaledVol) + '"/>';
      } else {
        h += '';
      }
      h += '</td>';

      h += '<td class="col-unit">' +
           (recipe.solvent.amount ? recipe.solvent.amount.unit : "") +
           '</td>';

      h += '<td colspan="3">' + recipe.solvent.nameHtml;

      if (recipe.solvent.property)
        h += ', ' + recipe.solvent.property;

      h += '</td></tr>';
    }
  
    h += "</tbody></table>";
    
    if (baseVol && baseVol > 0) {

      var presets = [0.5, 1, 2, 5, 10];

      h += '<div class="rc-scale">';
      h += '<span class="rc-scale-label">Scale:</span>';
      h += '<div class="rc-scale-presets">';

      for (var p = 0; p < presets.length; p++) {

        var active = Math.abs(scale - presets[p]) < 0.001 ? " active" : "";

        h += '<button class="rc-scale-btn' + active + '" data-scale="' + presets[p] + '">';
        h += "× " + presets[p];
        h += "</button>";
      }

      h += "</div></div>";
    }

    // Body
    h += '<div class="rc-body">';

    // Workup
    if (recipe.workups.length) {
      h += '<div class="rc-workup">';
      h += recipe.workups.join(". ") + ".";
      h += "</div>";
    }

    // Storage / shelflife
    if (recipe.shelflife || recipe.storage) {
      h += '<div class="rc-storage">';
      if (recipe.shelflife) {
        h += "Stable for " + recipe.shelflife;
        if (recipe.storage && recipe.shelflife.indexOf("store") === -1) {
          h += " at " + recipe.storage.html;
        }
        h += ".";
      } else if (recipe.storage) {
        h += "Store at " + recipe.storage.html + ".";
      }
      h += "</div>";
    }

    // Notes
    for (var n = 0; n < recipe.notes.length; n++) {
      var note = recipe.notes[n];
      var isCritical = note.type === "critical" || note.type === "safety";
      if (isCritical) {
        h += '<div class="rc-note rc-note-critical"><strong>Important:</strong> ' + note.html + "</div>";
      } else if (note.type) {
        h += '<div class="rc-note rc-note-typed">' + note.html + "</div>";
      } else {
        h += '<div class="rc-note">' + note.html + "</div>";
      }
    }

    // Safety
    if (recipe.safety) {
      var sig = recipe.safety.signal;
      var cls = sig === "danger" ? "rc-safety-danger" : sig === "warning" ? "rc-safety-warning" : "rc-safety-none";
      h += '<div class="rc-safety ' + cls + '">';
      if (sig) {
        var scls = sig === "danger" ? "rc-signal-danger" : "rc-signal-warning";
        h += '<span class="rc-signal ' + scls + '">' + sig + "</span><br/>";
      }
      var visible = recipe.safety.hazards.filter(function (hz) { return !hz.hide; });
      if (visible.length) {
        h += visible.map(function (hz) { return hz.text; }).join("; ");
      }
      for (var pc = 0; pc < recipe.safety.precautions.length; pc++) {
        h += '<div class="rc-safety-precaution">' + recipe.safety.precautions[pc] + "</div>";
      }
      for (var dp = 0; dp < recipe.safety.disposals.length; dp++) {
        h += "<div>" + recipe.safety.disposals[dp] + "</div>";
      }
      h += "</div>";
    }

    // Sources
    if (recipe.sources.length) {
      h += '<div class="rc-sources">Source: ';
      h += recipe.sources.map(function (s) {
        var label = s.type + " " + s.id + " v" + s.version;
        if (s.primary) label += " (shown)";
        return label;
      }).join(", ");
      h += "</div>";
    }

    h += "</div>"; // rc-body
    return h;
  }

  /* ==== State ==== */

  var allRecipes = [];
  var activeCats = {};
  var selectedId = null;
  var currentScale = 1;

  var searchEl     = document.getElementById("recipe-search");
  var statusEl     = document.getElementById("recipe-status");
  var listEl       = document.getElementById("recipe-list");
  var detailEl     = document.getElementById("recipe-detail");

  /* ==== Filtering ==== */

  function getFiltered() {
    const query = document.getElementById("recipe-search").value || "";
    const tokens = query.toLowerCase().trim().split(/\s+/).filter(Boolean);

    if (!tokens.length) return allRecipes;

    return allRecipes.filter(r => tokens.every(t => r._hay.includes(t)));
  }

  /* ==== Render list ==== */

  function renderList() {
    var filtered = getFiltered();
    var hasDetail = selectedId !== null;

    statusEl.textContent = filtered.length + " recipe" + (filtered.length !== 1 ? "s" : "");
    listEl.className = "recipe-list" + (hasDetail ? "" : " full-width");

    var h = "";

    if (filtered.length === 0) {
      // Placeholder disabled item
      h += '<button class="recipe-item disabled" disabled>';
      h += 'No recipes found';
      h += "</button>";
    } else {
      for (var i = 0; i < filtered.length; i++) {
        var r = filtered[i];
        var sel = r.id === selectedId ? " selected" : "";
        h += '<button class="recipe-item' + sel + '" data-id="' + r.id + '">';
        h += '<span class="recipe-item-name">' + r.nameHtml + "</span>";
        h += '<span class="recipe-item-id">' + r.id + "</span>";
        h += "</button>";
      }
    }

    listEl.innerHTML = h;

    // Attach click handlers
    var items = listEl.querySelectorAll(".recipe-item");
    for (var j = 0; j < items.length; j++) {
      items[j].addEventListener("click", function () {
        if (this.disabled) {
          // Clear filters on click of placeholder
          activeCats = {};
          recipeSearch.value = "";
          selectedId = null;
          currentScale = 1;
          renderList();
          renderDetail();
          return;
        }
        var id = this.getAttribute("data-id");
        selectedId = selectedId === id ? null : id;
        currentScale = 1;
        renderList();
        renderDetail();
      });
    }
  }

  /* ==== Render detail ==== */

  function renderDetail() {
    if (!selectedId) { detailEl.innerHTML = ""; return; }
    var recipe = allRecipes.find(function (r) { return r.id === selectedId; });
    if (!recipe) { detailEl.innerHTML = ""; return; }

    detailEl.innerHTML = '<div class="recipe-card">' + renderCard(recipe, currentScale) + "</div>";
    updateScaledValues();
    syncScaleUI();
    
  }
  
  function updateScaledValues() {
    const nodes = detailEl.querySelectorAll(".rc-amt");

    nodes.forEach(node => {
      const base = parseFloat(node.dataset.base);
      if (isNaN(base)) return;

      const scaled = base * currentScale;
      node.textContent = fmt(scaled);
    });
  }
  
  function syncScaleUI() {
    var recipe = allRecipes.find(r => r.id === selectedId);
    if (!recipe || !recipe.solvent || !recipe.solvent.amount) return;

    var baseVol = recipe.solvent.amount.value;

    // Update volume input
    var input = detailEl.querySelector("#rc-vol-input");
    if (input) {
      var recipe = allRecipes.find(r => r.id === selectedId);
      var baseVol = recipe?.solvent?.amount?.value;

      if (baseVol) {
        input.value = fmt(baseVol * currentScale);
      }
    }

    // Update preset button highlight
    detailEl.querySelectorAll(".rc-scale-btn").forEach(btn => {
      var btnScale = parseFloat(btn.getAttribute("data-scale"));
      if (Math.abs(btnScale - currentScale) < 1e-6) {
        btn.classList.add("active");
      } else {
        btn.classList.remove("active");
      }
    });
  }
  
  // Delegated click events for close button, scale buttons, cross-reference links
  detailEl.addEventListener("click", function(e) {
    // Close button
    if (e.target.id === "rc-close") {
      selectedId = null;
      currentScale = 1;
      renderList();
      renderDetail();
    }

    // Scale preset buttons
    if (e.target.classList.contains("rc-scale-btn") && selectedId) {

        var scale = parseFloat(e.target.dataset.scale);
        if (isNaN(scale) || scale <= 0) return;

        currentScale = scale;

        syncScaleUI();
        updateScaledValues();
      }

    // Cross-reference links
    if (e.target.classList.contains("rc-ref-link")) {
      e.stopPropagation();
      var refId = e.target.getAttribute("data-ref");
      var target = allRecipes.find(r => r.id === refId);
      if (target) {
        selectedId = refId;
        currentScale = 1;
        renderList();
        renderDetail();
      }
    }
  });

  // Delegated input event for volume input
  detailEl.addEventListener("input", function(e) {
    if (e.target.id === "rc-vol-input" && selectedId) {

      var v = parseFloat(e.target.value);
      if (isNaN(v) || v <= 0) return;

      var recipe = allRecipes.find(r => r.id === selectedId);
      if (!recipe || !recipe.solvent || !recipe.solvent.amount) return;

      var baseVol = recipe.solvent.amount.value;
      if (!baseVol || baseVol <= 0) return;

      currentScale = v / baseVol;

      updateScaledValues();
      // DO NOT call syncScaleUI() here
    }
  });

  // Re-render only when user leaves field
  detailEl.addEventListener("blur", function(e) {
    if (e.target.id === "rc-vol-input") {
      updateScaledValues();
    }
  }, true);

  /* ==== URL parameter support ==== */

  function checkUrlParams() {
    var params = new URLSearchParams(window.location.search);
    var q = params.get("q") || params.get("id") || "";
    if (q) {
      // Try exact ID match first
      var exact = allRecipes.find(function (r) { return r.id.toLowerCase() === q.toLowerCase(); });
      if (exact) {
        selectedId = exact.id;
      } else {
        searchEl.value = q;
      }
    }
  }

  /* ==== Load XML ==== */

  var xmlUrl = "/assets/protocols/recipes.xml";

  fetch(xmlUrl)
    .then(function (r) {
      if (!r.ok) throw new Error("recipes.xml HTTP " + r.status);
      return r.text();
    })
    .then(function (xmlText) {
      var parser = new DOMParser();
      var doc = parser.parseFromString(xmlText, "text/xml");
      var errorNode = doc.querySelector("parsererror");
      if (errorNode) throw new Error("XML parse error");

      var els = doc.getElementsByTagName("recipe");
      for (var i = 0; i < els.length; i++) {
        var el = els[i];
        if (!el.getAttribute("id")) continue;
        if (directChildren(el, "ingredient").length === 0) continue;
        allRecipes.push(parseRecipe(el));
      }
      
      allRecipes.forEach(r => {
        if (!r._hay) {
          r._hay = [
            r.name,
            r.abbreviation,
            r.id,
            (r.categories || []).join(" ")
          ].join(" ").toLowerCase();
        }
      });

      checkUrlParams();
      renderList();
      renderDetail();

      // Search input
      searchEl.addEventListener("input", function () {
        renderList();
      });
    })
    .catch(function (err) {
      console.error("Recipe load error:", err);
      statusEl.textContent = "";
      detailEl.innerHTML = '<div class="recipe-card" style="padding:1rem">' +
        "<p><strong>Error:</strong> Could not load recipe data.</p></div>";
    });
});
</script>
